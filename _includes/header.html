<div class='header'>
  <div class="container">
    <div class="logo-group">
      {% for logo in site.logos %}
        <a href="{{ logo.link | relative_url }}">
          <img
            src="{{ logo.src | relative_url }}"
            width="{{ logo.width }}"
            height="{{ logo.height }}"
            alt="logo" />
        </a>
      {% endfor %}
    </div>
    {% include main-menu.html %}
    {% include hamburger.html %}
  </div>
</div>
